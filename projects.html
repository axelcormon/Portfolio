<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Axel Cormon</title>
    <style>
        :root {
            --c1: #f4f1ea; --c2: #e0ddd5; --c3: #d1ce07; --c4: #b8b5ac;
            --transition-smooth: 1.2s cubic-bezier(0.2, 1, 0.2, 1);
            --modal-ui-color: white; 
        }

        html { margin: 0; padding: 0; width: 100%; scroll-behavior: auto !important; cursor: none !important; }
        body { margin: 0; padding: 0; width: 100%; background-color: #f4f1ea; font-family: 'Helvetica Neue', Arial, sans-serif; overflow-x: hidden; position: relative; box-sizing: border-box; cursor: none !important; }
        
        /* État figé quand modal ouverte */
        body.project-open { position: fixed; width: 100%; overflow: hidden; }

        #cursor {
            position: fixed; width: 32px; height: 32px;
            background-image: url('https://i.imgur.com/8FCKZAi.png'); background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 9999999; transform: translate(-50%, -50%); filter: invert(1); mix-blend-mode: difference;
        }

        *, *::before, *::after { cursor: none !important; }

        .grain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03; pointer-events: none; z-index: 9999; mix-blend-mode: multiply; animation: grainFlow 8s steps(10) infinite;
        }

        @keyframes grainFlow { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-1%, 1%); } 50% { transform: translate(1%, -1%); } }


        /* Style du Menu en haut à gauche */
        .top-menu {
            position: absolute;
            top: 40px;
            right: 40px; /* Position à droite */
            z-index: 10000; /* Au-dessus de tout sauf du curseur */
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: right; /* Aligne le texte à droite */
        }

        .menu-item {
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #1a1a1a; /* Couleur par défaut */
            font-weight: 400;
            transition: all 0.4s ease;
            opacity: 0.6;
            position: relative;
            width: fit-content;
        }

        /* Utilise la couleur dynamique quand la modale est ouverte ou au hover */
        body.project-open .menu-item {
            color: var(--modal-ui-color);
        }

        .menu-item:hover {
            opacity: 1;
            transform: translateX(-10px);
        }

        .menu-item::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: currentColor;
            transition: width 0.4s ease;
        }

        .menu-item:hover::before {
            width: 100%;
        }

        /* Cacher le menu quand la modale est ouverte pour épurer le visuel */
        body.project-open .top-menu {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* LE FOND DYNAMIQUE (Utilisé pour Hover ET Modal) */
        .dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0; 
            /* Transition plus longue et fluide pour les couleurs */
            transition: opacity 1s ease, background 1.5s cubic-bezier(0.2, 1, 0.2, 1);
            background: 
                radial-gradient(circle at 15% 25%, var(--c1) 0%, transparent 45%), 
                radial-gradient(circle at 85% 15%, var(--c2) 0%, transparent 45%), 
                radial-gradient(circle at 50% 85%, var(--c3) 0%, transparent 50%), 
                radial-gradient(circle at 80% 85%, var(--c4) 0%, transparent 45%);
            background-color: var(--c1); 
            filter: blur(60px); /* Blur réduit pour que les couleurs soient plus "présentes" */
            animation: floatBackground 20s ease-in-out infinite alternate;
            pointer-events: none;
        }

        /* Activation au Hover */
        body:has(.project-card:hover) .dynamic-bg { opacity: 0.7; }
        /* Activation à l'ouverture du projet */
        body.project-open .dynamic-bg { opacity: 1 !important; z-index: 500; }

        @keyframes floatBackground { 0% { transform: scale(1); } 100% { transform: scale(1.15) rotate(1deg); } }

        .background-paper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://i.imgur.com/7AuhwYG.png'); background-size: cover; z-index: -2; transition: opacity 1.5s ease, filter 1.5s ease; }

        .main-wrapper { padding: 120px 20px; transition: opacity 0.8s ease, filter 0.8s ease; }
        .projects-container { display: flex; flex-direction: column; max-width: 1100px; margin: 0 auto; }

        .project-card {
            position: relative; width: 60%; margin-bottom: -10%; 
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1), box-shadow 0.8s cubic-bezier(0.2, 1, 0.2, 1), filter 0.8s ease, opacity 0.8s ease;
            cursor: pointer; z-index: 10; --parallax-y: 0px; transform: translateY(var(--parallax-y)) scale(1); border-radius: 4px;
        }

        .project-card img { width: 100%; border-radius: 4px; display: block; }

        .project-card:hover {
            z-index: 100 !important;
            transform: translateY(var(--parallax-y)) scale(1.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        /* Effet sur les autres éléments au hover */
        .projects-container:has(.project-card:hover) .project-card:not(:hover) {
            filter: blur(5px) grayscale(0.5);
            opacity: 0.2;
        }

        .project-card.left { align-self: flex-start; }
        .project-card.right { align-self: flex-end; }

        /* Modal View */
        body.project-open .background-paper { opacity: 0.1; filter: blur(20px); }
        body.project-open .main-wrapper { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        #project-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between;
            padding: 0 12%; box-sizing: border-box; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 1s ease, color 0.5s ease; 
            color: var(--modal-ui-color); 
        }

        body.project-open #project-view { opacity: 1; pointer-events: auto; }

        .close-btn { 
            position: absolute; top: 60px; right: 60px; width: 54px; height: 54px; background: transparent;
            border: 1px solid var(--modal-ui-color); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); color: var(--modal-ui-color); padding: 0; z-index: 2001; opacity: 0.6;
        }
        .close-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; transition: transform 0.4s ease; }
        .close-btn:hover { background-color: var(--modal-ui-color); color: #ffffff; transform: scale(1.1); opacity: 1; }
        .close-btn:hover svg { transform: rotate(90deg); }

        .flying-img { position: fixed; z-index: 2000; transition: all 0.8s cubic-bezier(0.2, 1, 0.2, 1); pointer-events: none; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); object-fit: cover; }
        #view-img { opacity: 0; transition: opacity 0.3s ease 0.6s; }
        body.project-open #view-img { opacity: 1; }

        .skills-wrapper { display: flex; flex-wrap: wrap; gap: 10px; margin: 25px 0; }
        .skill-bubble { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 6px 16px; border-radius: 100px; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 300; color: inherit; }

        .view-left { width: 50%; }
        .view-left img { width: 100%; max-width: 550px; border-radius: 2px; box-shadow: 0 40px 100px rgba(0,0,0,0.3); }
        .view-right { width: 38%; }
        .view-right h2 { font-size: 4.5rem; margin: 0; font-weight: 200; text-transform: uppercase; letter-spacing: -2px; }
        .view-right p { font-size: 1rem; line-height: 1.7; opacity: 0.8; font-weight: 300; margin-bottom: 30px; }

        #colorCanvas { display: none; }
        
        #mobile-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: ivory; z-index: 1000000; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
        @media (max-width: 1024px), (pointer: coarse) { #mobile-blocker { display: flex; } body, html { overflow: hidden !important; } }

        #view-link { position: relative; display: inline-block; padding: 12px 24px; color: inherit; border: 1px solid currentColor; text-decoration: none; letter-spacing: 2px; font-size: 0.8rem; overflow: hidden; }
        #back-to-top {
    position: fixed;
    bottom: 40px;
    right: 40px;
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid currentColor;
    border-radius: 50%;
    color: var(--modal-ui-color, #1a1a1a);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9998;
    opacity: 0;
    visibility: hidden;
    transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
    transform: translateY(20px);
}

#back-to-top.visible {
    opacity: 0.6;
    visibility: visible;
    transform: translateY(0);
}

#back-to-top:hover {
    opacity: 1;
    background: var(--modal-ui-color);
    color: #fff; /* Ajuste selon tes préférences */
    transform: scale(1.1);
}

#back-to-top svg {
    width: 20px;
    height: 20px;
}

/* On cache le bouton quand un projet est ouvert pour ne pas gêner la lecture */
body.project-open #back-to-top {
    display: none;
}
    </style>
</head>
<body>

    <div id="mobile-blocker">
        <div class="blocker-content">
            <h1>EXPÉRIENCE NON SUPPORTÉE</h1>
            <p>Utilisez un ordinateur pour naviguer sur ce portfolio.</p>
        </div>
    </div>

    <nav class="top-menu">
        <a href="3d-part.html" class="menu-item" data-filter="3d">Partie 3D</a>
        <a href="graphics-part.html" class="menu-item" data-filter="graphique">Partie Graphique</a>
    </nav>

    <div class="grain-overlay"></div>
    <div class="background-paper"></div>
    <div class="dynamic-bg"></div>

    <div class="main-wrapper">
        <div class="projects-container"></div>
    </div>

    <div id="project-view">
        <button class="close-btn" onclick="closeProject()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="view-left"><img id="view-img" src=""></div>
        <div class="view-right">
            <h2 id="view-title">Projet</h2>
            <div class="skills-wrapper" id="view-skills"></div><br>
            <p id="view-desc">Description...</p>
            <a id="view-link" href="#" target="_blank"><span>VISITER LE SITE WEB</span></a>
        </div>
    </div>

    <canvas id="colorCanvas"></canvas>
    <div id="cursor"></div>
    
    <button id="back-to-top" aria-label="Remonter en haut">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cursor = document.getElementById("cursor");
            document.addEventListener("mousemove", (e) => {
                cursor.style.left = e.clientX + "px";
                cursor.style.top = e.clientY + "px";
            });
        });

        const canvas = document.getElementById('colorCanvas');
        const ctx = canvas.getContext('2d');
        let currentScroll = 0;

        // Fonction unique pour extraire et appliquer les couleurs au root
        function extractAndApplyColors(imgElement) {
            if (!imgElement.complete) return;
            canvas.width = imgElement.naturalWidth;
            canvas.height = imgElement.naturalHeight;
            ctx.drawImage(imgElement, 0, 0);
            
            // On prend 4 points stratégiques comme dans ta version initiale
            const points = [
                {x: 50, y:50}, 
                {x: canvas.width-50, y:50}, 
                {x: 50, y:canvas.height-50}, 
                {x: canvas.width/2, y:canvas.height/2}
            ];
            
            const rawColors = points.map(p => ctx.getImageData(p.x, p.y, 1, 1).data);
            
            // Mise à jour des variables CSS globales
            document.documentElement.style.setProperty('--c1', `rgb(${rawColors[0][0]}, ${rawColors[0][1]}, ${rawColors[0][2]})`);
            document.documentElement.style.setProperty('--c2', `rgb(${rawColors[1][0]}, ${rawColors[1][1]}, ${rawColors[1][2]})`);
            document.documentElement.style.setProperty('--c3', `rgb(${rawColors[2][0]}, ${rawColors[2][1]}, ${rawColors[2][2]})`);
            document.documentElement.style.setProperty('--c4', `rgb(${rawColors[3][0]}, ${rawColors[3][1]}, ${rawColors[3][2]})`);

            // Calcul de luminance pour l'UI
            const lum = (rawColors[0][0] * 0.2126 + rawColors[0][1] * 0.7152 + rawColors[0][2] * 0.0722) / 255;
            document.documentElement.style.setProperty('--modal-ui-color', lum > 0.5 ? '#1a1a1a' : '#ffffff');
        }

        window.closeProject = function() {
            document.body.classList.remove('project-open');
            document.body.style.top = '';
            window.scrollTo(0, currentScroll);
        }

        window.addEventListener('scroll', () => {
            if (document.body.classList.contains('project-open')) return;
            const s = window.scrollY;
            document.querySelectorAll('.project-card.left').forEach(c => c.style.setProperty('--parallax-y', `${s * -0.05}px`));
            document.querySelectorAll('.project-card.right').forEach(c => c.style.setProperty('--parallax-y', `${s * -0.02}px`));
        });

        window.initializeProjectClicks = function() {
            document.querySelectorAll('.project-card').forEach(card => {
                const img = card.querySelector('img');

                // AU SURVOL : On extrait les couleurs et on les applique au fond dynamique
                card.addEventListener('mouseenter', () => extractAndApplyColors(img));

                card.addEventListener('click', () => {
                    currentScroll = window.scrollY;
                    const rect = img.getBoundingClientRect();
                    const clone = img.cloneNode();
                    clone.classList.add('flying-img');
                    Object.assign(clone.style, { top: rect.top + 'px', left: rect.left + 'px', width: rect.width + 'px', height: rect.height + 'px' });
                    document.body.appendChild(clone);

                    document.body.style.top = `-${currentScroll}px`;
                    document.body.classList.add('project-open');

                    // On ré-extrait au cas où, pour l'UI de la modale
                    extractAndApplyColors(img);
                    
                    document.getElementById('view-title').innerText = card.getAttribute('data-title');
                    document.getElementById('view-desc').innerText = card.getAttribute('data-desc');
                    document.getElementById('view-link').href = card.getAttribute('data-url');
                    
                    const modalImg = document.getElementById('view-img');
                    modalImg.src = img.src;

                    const skillsData = card.getAttribute('data-skills');
                    const container = document.getElementById('view-skills');
                    container.innerHTML = '';
                    if(skillsData) {
                        skillsData.split(',').forEach(s => {
                            const b = document.createElement('span');
                            b.className = 'skill-bubble';
                            b.innerText = s.trim();
                            container.appendChild(b);
                        });
                    }

                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const destRect = modalImg.getBoundingClientRect();
                            Object.assign(clone.style, { top: destRect.top + 'px', left: destRect.left + 'px', width: destRect.width + 'px', height: destRect.height + 'px' });
                        });
                    });

                    setTimeout(() => {
                        clone.style.opacity = '0';
                        setTimeout(() => clone.remove(), 800);
                    }, 850);
                });
            });
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdNM9a4FebeSYb_4FHncZZUUrvQcqsOns",
            authDomain: "suivicommande-568fa.firebaseapp.com",
            projectId: "suivicommande-568fa",
            storageBucket: "suivicommande-568fa.firebasestorage.app",
            messagingSenderId: "47289143178",
            appId: "1:47289143178:web:17f464d00a0bdb9b7d0273",
            measurementId: "G-VP90K7NSD8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadProjectsFromFirebase() {
            try {
                const q = query(collection(db, "projects"), orderBy("order", "asc"));
                const querySnapshot = await getDocs(q);
                const container = document.querySelector('.projects-container');
                container.innerHTML = '';
                let index = 0;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const side = (index % 2 === 0) ? 'left' : 'right';
                    const projectCard = document.createElement('div');
                    projectCard.className = `project-card ${side}`;
                    projectCard.setAttribute('data-title', data.title || '');
                    projectCard.setAttribute('data-url', data.url || '#');
                    projectCard.setAttribute('data-skills', data.skills || '');
                    projectCard.setAttribute('data-desc', data.description || '');
                    projectCard.innerHTML = `<img src="${data.image}" crossorigin="anonymous">`;
                    container.appendChild(projectCard);
                    index++;
                });
                window.initializeProjectClicks(); 
            } catch (error) { console.error("Firebase:", error); }
        }
        loadProjectsFromFirebase();
    </script>
    <script>const backToTop = document.getElementById("back-to-top");

window.addEventListener("scroll", () => {
    // Le bouton apparaît après 400px de scroll
    if (window.scrollY > 400 && !document.body.classList.contains('project-open')) {
        backToTop.classList.add("visible");
    } else {
        backToTop.classList.remove("visible");
    }
});

backToTop.addEventListener("click", () => {
    window.scrollTo({
        top: 0,
        behavior: "smooth" // Remontée fluide
    });
});</script>
</body>
</html>
